apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask-app
        image: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/my-repo/flask-app-image:latest
        ports:
        - name: http-flaskPort
          containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
